<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán đơn hàng</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
        }
    </style>
</head>
<body>

    <h1>Hoàn tất Đặt hàng</h1>

    <form action="#" method="POST">
        
        <div>
            <label for="search">Tìm sản phẩm nhanh (Bonus Datalist):</label>
            <input list="products" id="search" name="search" placeholder="Gõ để tìm kiếm...">
            <datalist id="products">
                <option value="Bàn phím cơ không dây">
                <option value="Chuột Gaming Logitech">
                <option value="Tai nghe chống ồn Sony">
                <option value="Màn hình Dell Ultrasharp">
                <option value="Lót chuột cỡ lớn">
            </datalist>
        </div>
        <br>

        <div>
            <label>Điểm tích lũy thành viên:</label>
            <meter value="75" min="0" max="100" low="30" high="80" optimum="90"></meter>
            <span>75/100</span>
        </div>
        <br>

        <h2>1. Giỏ hàng của bạn</h2>
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Bàn phím cơ không dây</td>
                    <td>1,500,000đ</td>
                    <td>1</td>
                    <td>1,500,000đ</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Chuột Gaming Logitech</td>
                    <td>800,000đ</td>
                    <td>2</td>
                    <td>1,600,000đ</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" align="right"><b>Tổng cộng:</b></td>
                    <td>
                        <b><output name="totalPrice">3,100,000đ</output></b>
                    </td>
                </tr>
            </tfoot>
        </table>
        <br>

        <fieldset>
            <legend>2. Thông tin Thanh toán</legend>

            <label>Phương thức thanh toán:</label><br>
            <input type="radio" id="payCOD" name="payment" value="COD" checked>
            <label for="payCOD">Thanh toán khi nhận hàng (COD)</label><br>

            <input type="radio" id="payBank" name="payment" value="BankTransfer">
            <label for="payBank">Chuyển khoản ngân hàng</label><br>

            <input type="radio" id="payWallet" name="payment" value="EWallet">
            <label for="payWallet">Ví điện tử</label><br><br>

            <label for="discountCode">Mã giảm giá (VD: SALE2026):</label>
            <input type="text" id="discountCode" name="discountCode" pattern="^SALE[0-9]{4}$" title="Mã phải bắt đầu bằng chữ SALE và kèm theo 4 chữ số"><br><br>

            <label for="notes">Ghi chú đơn hàng:</label><br>
            <textarea id="notes" name="notes" rows="3" cols="40"></textarea>
        </fieldset>
        <br>

        <fieldset>
            <legend>3. Thời gian Giao hàng</legend>

            <label for="deliveryDate">Ngày giao hàng mong muốn:</label>
            <input type="date" id="deliveryDate" name="deliveryDate" min="2026-04-24" required><br><br>

            <label for="deliveryTime">Khung giờ nhận hàng:</label>
            <select id="deliveryTime" name="deliveryTime" required>
                <option value="" disabled selected>-- Chọn khung giờ --</option>
                <option value="morning">Sáng (8h - 12h)</option>
                <option value="afternoon">Chiều (14h - 18h)</option>
                <option value="evening">Tối (18h - 21h)</option>
            </select><br><br>

            <label for="deliveryDuration">Thời gian giao hàng (1-7 ngày):</label>
            Nhanh <input type="range" id="deliveryDuration" name="deliveryDuration" min="1" max="7" step="1" value="3"> Chậm
        </fieldset>
        <br>

        <button type="submit" aria-label="Xác nhận đặt hàng">Xác nhận Đặt hàng</button>
        <button type="reset">Làm mới</button>

    </form>

</body>
</html>
